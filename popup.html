<!DOCTYPE html>
<html>
<head>
  <title>LaLaTron</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 560px;
      min-width: 700px;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      overflow: hidden; /* prevent popup from growing beyond window */
    }

    .root {
      display: flex;
      height: 100%;
      max-width: 720px;
    }

    .sidebar {
      width: 64px;
      background: #111827;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 6px;
      gap: 10px;
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #4f46e5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
      color: #f9fafb;
      margin-bottom: 4px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 600;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      margin-top: 8px;
      flex: 1;
    }

    .nav-item {
      width: 100%;
      border: none;
      background: transparent;
      color: #9ca3af;
      font-size: 11px;
      cursor: pointer;
      padding: 6px 2px;
      border-radius: 6px;
      text-align: center;
    }

    .nav-item:hover {
      background: #1f2937;
      color: #f9fafb;
    }

    .nav-item.active {
      background: #4f46e5;
      color: #f9fafb;
    }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 8px 8px 10px 8px;
    }

    .container {
      padding: 0;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .section {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 600;
    }

    .section-subtitle {
      font-size: 12px;
      color: #6b7280;
    }

    .section-header-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .section-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #chatWindow {
      height: 425px;
      width: 100%;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px;
      background: #fafafa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #userInput {
      flex: 1;
      border-radius: 4px;
      border: 1px solid #d1d5db;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
    }

    #userInput:focus {
      border-color: #4f46e5;
    }

    .button {
      border-radius: 4px;
      border: 1px solid #d1d5db;
      padding: 6px 10px;
      font-size: 12px;
      background: #ffffff;
      cursor: pointer;
    }

    .button-primary {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #ffffff;
    }

    .button-primary:hover {
      background: #4338ca;
      border-color: #4338ca;
    }

    .button:hover {
      background: #f9fafb;
    }

    .stats-row {
      display: flex;
      gap: 12px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat-label {
      color: #6b7280;
    }

    .stat-value {
      font-weight: 600;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-top: 6px;
    }

    .settings-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 12px;
    }

    .settings-field label {
      font-weight: 500;
      color: #374151;
    }

    .settings-input {
      border-radius: 4px;
      border: 1px solid #d1d5db;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }

    .settings-input:focus {
      border-color: #4f46e5;
    }

    .settings-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
      color: #6b7280;
    }

    .link-button {
      border: none;
      background: transparent;
      color: #4f46e5;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
      text-decoration: underline;
    }

    .link-button:hover {
      color: #3730a3;
    }
  </style>
</head>
<body>
  <div class="root">
    <aside class="sidebar">
      <div class="sidebar-logo">L</div>
      <div class="sidebar-title">LaLa</div>
      <div class="sidebar-nav">
        <button class="nav-item active" data-view="chat">
          Chat
        </button>
        <button class="nav-item" data-view="autofill">
          Forms
        </button>
        <button class="nav-item" data-view="settings">
          Settings
        </button>
      </div>
    </aside>
    <main class="main">
      <div class="container">
        <div class="section view active" id="view-chat">
      <div class="section-header">
        <div class="section-header-text">
          <div class="section-title">Web Chat</div>
          <div class="section-subtitle">Talk to LaLaTron or ask about the page you are on.</div>
        </div>
        <div class="section-actions">
          <button id="newChatBtn" class="button">New chat</button>
          <button id="scrapeBtn" class="button">Use page context</button>
          <button id="screenshotBtn" class="button">Screenshot</button>
        </div>
      </div>
      <div id="chatWindow"></div>
      <div class="input-row">
        <input type="text" id="userInput" placeholder="Ask anything or type /help" />
        <button id="sendBtn" class="button button-primary">Send</button>
      </div>
        </div>

        <div class="section view" id="view-autofill">
          <div class="section-header">
            <div class="section-header-text">
              <div class="section-title">Form Autofill</div>
              <div class="section-subtitle">Maintain multiple knowledge sources and use one to fill similar forms.</div>
            </div>
          </div>

          <div class="settings-field" style="margin-bottom:6px;">
            <label for="autofillKnowledgeList">Saved knowledge</label>
            <select id="autofillKnowledgeList" class="settings-input">
              <option value="">-- No saved knowledge selected --</option>
            </select>
          </div>

          <div class="settings-field" style="margin-bottom:6px;">
            <label for="autofillKnowledgeTitle">Title</label>
            <input
              id="autofillKnowledgeTitle"
              class="settings-input"
              type="text"
              placeholder="e.g. Resume, Company profile, FAQ"
            />
          </div>

          <div class="settings-field" style="margin-bottom:8px;">
            <label for="autofillKnowledgeInput">Knowledge document (paste text here)</label>
            <textarea
              id="autofillKnowledgeInput"
              class="settings-input"
              style="height:100px;resize:vertical;"
              placeholder="Paste resume, profile, or any reference text. LaLaTron will infer answers from this when autofilling forms."
            ></textarea>
          </div>

          <div id="autofillKnowledgeInfo" style="font-size:11px;color:#6b7280;margin-bottom:8px;"></div>

          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button id="saveKnowledgeBtn" class="button">Save / update</button>
              <button id="newKnowledgeBtn" class="button">New</button>
              <button id="deleteKnowledgeBtn" class="button">Delete</button>
            </div>
            <button id="autofillNowBtn" class="button button-primary">Autofill current page</button>
          </div>
        </div>

        <div class="section view" id="view-settings">
      <div class="section-header">
        <div class="section-header-text">
          <div class="section-title">Settings</div>
          <div class="section-subtitle">Configure your API key and models.</div>
        </div>
      </div>
      <div class="settings-grid">
        <div class="settings-field" style="grid-column:1 / span 2;">
          <label for="settingsApiKey">Groq API key</label>
          <input
            id="settingsApiKey"
            class="settings-input"
            type="password"
            placeholder="gsk_xxx..."
            autocomplete="off"
          />
        </div>
        <div class="settings-field">
          <label for="settingsChatModel">Chat model</label>
          <input
            id="settingsChatModel"
            class="settings-input"
            type="text"
            placeholder="llama-3.3-70b-versatile"
          />
        </div>
        <div class="settings-field">
          <label for="settingsVisionModel">Vision model</label>
          <input
            id="settingsVisionModel"
            class="settings-input"
            type="text"
            placeholder="meta-llama/llama-4-scout-17b-16e-instruct"
          />
        </div>
      </div>
      <div class="settings-footer">
        <div id="settingsStatus"></div>
        <button id="saveSettingsBtn" class="button button-primary">Save settings</button>
      </div>
        </div>
      </div>
    </main>
  </div>

  <script src="scripts/popup.js"></script>
</body>
</html>
